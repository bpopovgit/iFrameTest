<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <title>Nuvei Cashier iFrame Test</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      background: #f4f6f8;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f4f6f8;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: #f4f6f8;
    }

    .header {
      padding:
        max(16px, env(safe-area-inset-top))
        16px
        14px
        16px;
      background: #0f172a;
      color: #fff;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      opacity: 0.92;
    }

    .frame-wrap {
      flex: 1;
      padding: 0;
      min-height: 0;
    }

    .frame-card {
      width: 100%;
      min-height: calc(100dvh - 84px);
      background: #fff;
      border: 0;
      border-radius: 0;
      overflow: visible;
    }

    iframe {
      display: block;
      width: 100%;
      min-height: calc(100dvh - 84px);
      height: calc(100dvh - 84px);
      border: 0;
      background: #fff;
    }

    @supports not (height: 100dvh) {
      .page {
        min-height: 100vh;
      }

      .frame-card,
      iframe {
        min-height: calc(100vh - 84px);
        height: calc(100vh - 84px);
      }
    }

    @media (max-width: 768px) {
      .header {
        padding-left: 14px;
        padding-right: 14px;
      }

      .header h1 {
        font-size: 17px;
      }

      .header p {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1>Nuvei Cashier iFrame Test</h1>
      <p>
        iPhone-optimized wrapper for testing viewport height, scrolling, and
        overlap behavior.
      </p>
    </div>

    <div class="frame-wrap">
      <div class="frame-card">
        <iframe
          src="https://secure.nuvei.com/ppp/purchase.do?merchant_id=6615758783701861281&merchant_site_id=203678&version=4.0.0&user_token_id=c7395b5a-617a&item_open_amount_1=true&item_min_amount_1=1&item_max_amount_1=100&currency=EUR&item_name_1=Test%20Product&item_amount_1=10&item_quantity_1=1&total_amount=10.00&first_name=John&address1=5th%20Avenue&payment_method=cc_card&last_name=Doe&city=New%20York&merchantLocale=en_US&phone1=001%20123%20456%20789&zip=1000&email=test@nuvei.com&country=PT&notify_url=https://www.yobingo.pt/bd9ad679a718de39c84b3f82b06d3f5ddbf49d02/deposit&success_url=https://www.yobingo.pt/cashier/scOk&error_url=https://www.yobingo.pt/cashier/scNok&pending_url=https://www.yobingo.pt/cashier/scPending&back_url=https://www.yobingo.pt/cashier/deposit&time_stamp=2026-04-06%2015:40:39&m_id=154928&hash=md5&checksum=b55d89a41f8577625e4fa7b827c0983f"
          title="Nuvei Cashier Test"
          allow="payment *"
          loading="eager"
        ></iframe>
      </div>
    </div>
  </div>
</body>
</html>
